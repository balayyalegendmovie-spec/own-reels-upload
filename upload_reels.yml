name: 🎬 Auto Upload Reels (Telugu)

on:
  schedule:
    # Telugu: fires at :00 or :30 — IST peak times for maximum reach
    - cron: '0 1 * * *'       # IST  6:30 AM
    - cron: '30 2 * * *'      # IST  8:00 AM
    - cron: '0 5 * * *'       # IST 10:30 AM
    - cron: '0 7 * * *'       # IST 12:30 PM
    - cron: '30 8 * * *'      # IST  2:00 PM
    - cron: '0 10 * * *'      # IST  3:30 PM
    - cron: '30 11 * * *'     # IST  5:00 PM
    - cron: '0 13 * * *'      # IST  6:30 PM
    - cron: '30 14 * * *'     # IST  8:00 PM
    - cron: '0 16 * * *'      # IST  9:30 PM
    - cron: '30 17 * * *'     # IST 11:00 PM
    - cron: '0 20 * * *'      # IST  1:30 AM
  workflow_dispatch:

concurrency:
  group: telugu-uploader
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run uploader (optimized for max reach)
        env:
          IG_USERNAME:      ${{ secrets.IG_USERNAME }}
          IG_PASSWORD:      ${{ secrets.IG_PASSWORD }}
          IG_SESSION:       ${{ secrets.IG_SESSION }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_API_KEY:   ${{ secrets.GDRIVE_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          WATERMARK_TEXT:    ${{ secrets.WATERMARK_TEXT }}
          CONTENT_LANGUAGE:  ${{ secrets.CONTENT_LANGUAGE }}
          CLIP_LEN:          "95"
        run: python main.py

      - name: Final save
        if: always()
        run: |
          git config user.name "ReelBot"
          git config user.email "bot@reelbot.com"
          git pull --rebase || true
          git add progress.json movies_log.json upload_history.json .gitignore 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 final save"
          git push || true
